services:
  # Stateless UI + light API (enqueue, dashboards). Can also run on Vercel.
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Full app WITH ffmpeg + chromium — processes queue ticks incl. render/upload.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Scheduler: drives queue ticks + the daily dispatch against the worker.
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["node", "scripts/worker-loop.mjs"]
    env_file: .env
    environment:
      - APP_URL=http://worker:3000
    restart: unless-stopped
    depends_on:
      worker:
        condition: service_healthy
